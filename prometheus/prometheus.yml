global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 1. Scraping the FastAPI API Metrics
  - job_name: 'fastapi-api'
    metrics_path: '/metrics'  # Default path used by prometheus_fastapi_instrumentator
    static_configs:
      - targets: ['api:8000'] # Uses internal Docker bridge DNS name

  # 2. Scraping the Computer Vision Python Worker
  - job_name: 'python-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:8001']

  # 3. Prometheus Self-Monitoring Check
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # Localhost works fine here because it targets itself
